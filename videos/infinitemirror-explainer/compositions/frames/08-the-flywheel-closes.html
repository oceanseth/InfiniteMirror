      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};
        (function () {
          var DUR = 12.843;
          var tl = gsap.timeline({ paused: true });

          /* --- svg-path-draw setup: measure each solid path, hide via dashoffset --- */
          var drawIds = ["fw8-flowarc", "fw8-s1", "fw8-s2", "fw8-s3", "fw8-s4", "fw8-s5"];
          drawIds.forEach(function (id) {
            var p = document.getElementById(id);
            var len = p.getTotalLength() * 1.02;
            p.style.strokeDasharray = String(len);
            p.style.strokeDashoffset = String(len);
          });
          function draw(id, at, dur) {
            tl.to("#" + id, { strokeDashoffset: 0, duration: dur, ease: "power2.out" }, at);
          }

          /* ================= Scene 1 (0–2.75s) — "That data trains a communication
             LoRA on Tinker": chips flow along a drawn arc into the LoRA node ======= */
          tl.fromTo(
            "#fw8-chip1",
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
            0.15
          );
          tl.fromTo(
            "#fw8-chip2",
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
            0.32
          );
          tl.fromTo(
            "#fw8-chip3",
            { opacity: 0, y: 16 },
            { opacity: 1, y: 0, duration: 0.55, ease: "power3.out" },
            0.49
          );

          draw("fw8-flowarc", 0.55, 0.7);

          /* LoRA node seats as "LoRA" is spoken */
          tl.fromTo(
            "#fw8-lora",
            { opacity: 0, y: 14 },
            { opacity: 1, y: 0, duration: 0.6, ease: "power3.out" },
            0.95
          );

          /* dash-flow (svg-icon-enrichment): finite, linear, integer dash periods */
          tl.fromTo(
            "#fw8-flowdash",
            { opacity: 0 },
            { opacity: 0.7, duration: 0.2, ease: "power1.out" },
            1.05
          );
          tl.to("#fw8-flowdash", { strokeDashoffset: -240, duration: 1.8, ease: "none" }, 1.05);

          /* "on Tinker" */
          tl.fromTo(
            "#fw8-tinker",
            { opacity: 0, y: 8 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
            1.65
          );

          /* absorb blip on the LoRA node — smooth, no bounce */
          tl.to("#fw8-lora", { scale: 1.03, duration: 0.22, ease: "power2.inOut" }, 2.05);
          tl.to("#fw8-lora", { scale: 1, duration: 0.3, ease: "power2.out" }, 2.27);

          /* ================= Scene 2 (2.75–5.5s) — "hot-loads straight onto our
             inference layer": adapter chip slides onto the vLLM chip and seats ===== */
          tl.fromTo(
            "#fw8-vllm",
            { opacity: 0, y: 18 },
            { opacity: 1, y: 0, duration: 0.65, ease: "power3.out" },
            2.85
          );
          tl.fromTo(
            "#fw8-vllm-tag",
            { opacity: 0, y: 8 },
            { opacity: 1, y: 0, duration: 0.5, ease: "power3.out" },
            3.25
          );

          /* card-morph-anchor: the adapter is the moving anchor — it appears at the
             LoRA node, morphs down to slot size while it slides, then click-seats */
          tl.fromTo(
            "#fw8-adapter",
            { x: -600, y: 29, scaleX: 1.28, scaleY: 1.3, opacity: 0 },
            { opacity: 1, duration: 0.3, ease: "power2.out" },
            3.1
          );
          tl.to(
            "#fw8-adapter",
            { x: 0, y: 0, scaleX: 1, scaleY: 1, duration: 1.05, ease: "power3.inOut" },
            3.5
          );
          /* single click settle on seat */
          tl.fromTo(
            "#fw8-adapter",
            { scale: 1.045 },
            { scale: 1, duration: 0.22, ease: "power3.out" },
            4.6
          );
          tl.to(
            "#fw8-slot",
            { borderColor: "rgba(31,43,224,1)", duration: 0.25, ease: "power2.out" },
            4.55
          );

          /* ================= Scene 3 (5.5–10.09s) — five signposted beats:
             Inference. Traces. Evals. LoRA. Better inference. ===================== */
          /* the training pipeline recedes to a ghost; the vLLM core takes ring center */
          tl.to("#fw8-dimmable", { opacity: 0.13, duration: 0.8, ease: "power2.inOut" }, 5.5);
          tl.to(
            "#fw8-vllm",
            { x: -330, y: 35, scale: 0.8, duration: 0.9, ease: "power3.inOut" },
            5.5
          );

          var cues = [5.78, 6.61, 7.43, 8.26, 9.08];
          cues.forEach(function (cue, i) {
            tl.fromTo(
              "#fw8-n" + (i + 1),
              { opacity: 0, y: 16, scale: 0.97 },
              { opacity: 1, y: 0, scale: 1, duration: 0.6, ease: "power3.out" },
              cue
            );
          });
          /* each connecting arc self-draws into the node being spoken */
          draw("fw8-s1", 6.46, 0.5);
          draw("fw8-s2", 7.28, 0.5);
          draw("fw8-s3", 8.11, 0.5);
          draw("fw8-s4", 8.93, 0.5);

          /* ================= Scene 4 (10.09–12.843s) — "The loop closes":
             final arc completes the circle; one finite sweep, then stillness ====== */
          draw("fw8-s5", 10.35, 0.6);
          tl.fromTo(
            "#fw8-sweep",
            { opacity: 0 },
            { opacity: 0.95, duration: 0.18, ease: "power1.out" },
            10.95
          );
          tl.to(
            "#fw8-sweep",
            { strokeDashoffset: -1696.5, duration: 1.45, ease: "power1.inOut" },
            10.95
          );
          tl.to("#fw8-sweep", { opacity: 0, duration: 0.25, ease: "power1.in" }, 12.28);

          /* --- asr-keyword-glow: attack/sustain/release envelope per node label --- */
          var GLOW = {
            "fw8-name1": [
              [5.78, 6.35],
              [10.95, 11.65],
            ],
            "fw8-name2": [[6.61, 7.15]],
            "fw8-name3": [[7.43, 7.98]],
            "fw8-name4": [[8.26, 8.8]],
            "fw8-name5": [[9.08, 9.85]],
          };
          var ATTACK = 0.15,
            RELEASE = 0.45,
            REST = 0.22,
            MAX_BLUR = 16,
            MAX_SCALE = 0.05;
          var glowEls = Object.keys(GLOW).map(function (id) {
            return document.getElementById(id);
          });
          function envAt(t, wins) {
            var e = 0;
            for (var i = 0; i < wins.length; i++) {
              var s = wins[i][0],
                en = wins[i][1],
                v = 0;
              if (t >= s) {
                if (t < en) v = Math.min((t - s) / ATTACK, 1);
                else if (t < en + RELEASE) v = 1 - ((t - en) / RELEASE) * (1 - REST);
                else v = REST;
              }
              if (v > e) e = v;
            }
            return e;
          }
          var drv = { t: 0 };
          tl.to(
            drv,
            {
              t: DUR,
              duration: DUR,
              ease: "none",
              onUpdate: function () {
                for (var i = 0; i < glowEls.length; i++) {
                  var el = glowEls[i];
                  var e = envAt(drv.t, GLOW[el.id]);
                  el.style.textShadow =
                    "0 0 " + (MAX_BLUR * e).toFixed(1) + "px rgba(31,43,224," + (0.55 * e).toFixed(3) + ")";
                  el.style.transform = "scale(" + (1 + MAX_SCALE * e).toFixed(4) + ")";
                }
              },
            },
            0
          );

          window.__timelines["08-the-flywheel-closes"] = tl;
        })();
      </script>
