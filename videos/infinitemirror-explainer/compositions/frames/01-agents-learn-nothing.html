      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var ID = "01-agents-learn-nothing";
          var SCOPE = document.querySelector('[data-composition-id="' + ID + '"]');

          /* Scene windows: storyboard drafted 0–9.0s, real duration 7.296s
             → scale 0.8107. S1 0–2.11 · S2 2.11–3.89 · S3 3.89–6.16 · S4 6.16–7.296 */
          var SWAP1 = 2.11; /* "thousands of times a day" spoken */
          var SWAP2 = 3.89; /* "here's the problem…" → payoff line */
          var GLOW_START = 5.4; /* "nothing" spoken */
          var GLOW_END = 6.1;
          var JITTER_START = 6.3;
          var END = 7.296;

          var tl = gsap.timeline({ paused: true });

          /* ── Scene 1: per-word staggered reveal (dynamic-content-sequencing) ── */
          var kicker = SCOPE.querySelector("#f01aln-kicker");
          tl.fromTo(
            kicker,
            { autoAlpha: 0, y: 8 },
            { autoAlpha: 1, y: 0, duration: 0.6, ease: "power3.out" },
            0.25
          );

          var words = SCOPE.querySelectorAll(".w1w");
          words.forEach(function (w, i) {
            tl.fromTo(
              w,
              { autoAlpha: 0, y: 26 },
              { autoAlpha: 1, y: 0, duration: 0.65, ease: "power3.out" },
              0.12 + i * 0.11
            );
          });

          /* Message web: measure + prime each hairline (svg-path-draw) */
          var msgs = SCOPE.querySelectorAll(".msg");
          msgs.forEach(function (p) {
            var len = p.getTotalLength();
            p.style.strokeDasharray = String(len);
            p.style.strokeDashoffset = String(len);
            tl.to(
              p,
              {
                strokeDashoffset: 0,
                duration: parseFloat(p.dataset.d),
                ease: "power2.out",
              },
              parseFloat(p.dataset.t)
            );
          });

          /* Agent dots sprout (sequential, never random) */
          var dots = SCOPE.querySelectorAll(".dot");
          dots.forEach(function (d) {
            tl.fromTo(
              d,
              { opacity: 0, scale: 0.5, transformOrigin: "50% 50%" },
              { opacity: 1, scale: 1, duration: 0.45, ease: "power3.out" },
              parseFloat(d.dataset.t)
            );
          });

          /* ── Scene 2: hard-cut swap (discrete-text-sequence mechanics) ── */
          var line1 = SCOPE.querySelector("#f01aln-line1");
          var line2 = SCOPE.querySelector("#f01aln-line2");
          var line3 = SCOPE.querySelector("#f01aln-line3");

          tl.set(line1, { autoAlpha: 0 }, SWAP1);
          tl.set(line2, { autoAlpha: 1 }, SWAP1);
          tl.fromTo(
            SCOPE.querySelector("#f01aln-l2settle"),
            { scale: 1.05 },
            { scale: 1, duration: 0.8, ease: "power3.out", immediateRender: false },
            SWAP1
          );

          /* ── Scene 3: hard-cut swap to the payoff line ── */
          tl.set(line2, { autoAlpha: 0 }, SWAP2);
          tl.set(line3, { autoAlpha: 1 }, SWAP2);
          tl.fromTo(
            SCOPE.querySelector("#f01aln-l3settle"),
            { scale: 1.05 },
            { scale: 1, duration: 0.9, ease: "power3.out", immediateRender: false },
            SWAP2
          );

          /* Web freezes: dim + defocus the supporting planes (depth-of-field-blur) */
          ["#f01aln-webA", "#f01aln-webB", "#f01aln-webC"].forEach(function (sel) {
            var el = SCOPE.querySelector(sel);
            var depth = Number(el.dataset.depth) || 1;
            tl.to(
              el,
              {
                "--dof": depth * 3 + "px",
                opacity: 0.5,
                duration: 0.85,
                ease: "power2.inOut",
              },
              SWAP2 + 0.03
            );
          });

          /* Keyword glow on "nothing" (asr-keyword-glow envelope: attack→sustain→release→rest) */
          var kw = SCOPE.querySelector("#f01aln-kw");
          var MAX_BLUR = 24;
          var MAX_SCALE_BOOST = 0.08;
          var REST_LEVEL = 0.25;
          function applyGlow(env) {
            kw.style.textShadow =
              "0 0 " + (MAX_BLUR * env).toFixed(2) + "px rgba(31,43,224," + (0.15 + 0.6 * env).toFixed(3) + ")";
            kw.style.transform = "scale(" + (1 + MAX_SCALE_BOOST * env).toFixed(4) + ")";
          }
          var glow = { v: 0 };
          tl.to(
            glow,
            {
              v: 1,
              duration: 0.2,
              ease: "none",
              onUpdate: function () {
                applyGlow(glow.v);
              },
            },
            GLOW_START
          );
          tl.to(
            glow,
            {
              v: REST_LEVEL,
              duration: 0.45,
              ease: "power1.out",
              onUpdate: function () {
                applyGlow(glow.v);
              },
            },
            GLOW_END
          );

          /* ── Scene 4: held read — subtle jitter on the payoff only (sine-wave-loop, low amp) ── */
          var jit = SCOPE.querySelector("#f01aln-jitter");
          var phase = { p: 0 };
          tl.to(
            phase,
            {
              p: Math.PI * 2,
              duration: END - JITTER_START,
              ease: "none",
              onUpdate: function () {
                var y = Math.sin(phase.p) * 1.4 + Math.sin(phase.p * 2.3) * 0.6;
                jit.style.transform = "translateY(" + y.toFixed(3) + "px)";
              },
            },
            JITTER_START
          );

          window.__timelines[ID] = tl;
        })();
      </script>
