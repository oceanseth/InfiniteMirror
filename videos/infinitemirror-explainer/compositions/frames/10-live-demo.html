      <div
        id="root"
        data-composition-id="10-live-demo"
        data-width="1920"

      >
        <!-- Ground: paper + grid + hairlines -->
        <div
          class="clip bg"
          data-start="0"
          data-duration="11.913"
          data-track-index="0"
        >
          <div class="hairline top"></div>
          <div class="hairline bottom"></div>
        </div>

        <!-- Stage: window hero + callouts + URL -->
        <div
          class="clip stage"
          data-start="0"
          data-duration="11.913"
          data-track-index="1"
        >
          <div class="window-wrap" id="f10-window-wrap">
            <div class="window">
              <div class="titlebar">
                <div class="tb-squares"><span></span><span></span><span></span></div>
                <div class="tb-title">dashboard.infinitemirror.masky.ai</div>
                <div class="tb-live"><i></i>LIVE</div>
              </div>
              <div class="viewport">
                <div class="zoom-outer" id="f10-zoom-outer">

          <div class="url-row">

              <span class="url-seg">infinitemirror</span><span class="url-seg">.</span><span class="url-seg">masky</span><span class="url-seg">.</span><span class="url-seg">ai</span>

      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        (function () {
          window.__timelines = window.__timelines || {};
          var tl = gsap.timeline({ paused: true });

          /* ---- Camera math (coordinate-target-zoom, fixed-px geometry) ----
             Screenshot source 2000x1063 rendered at 1140x606 (K = 0.57).
             Outer wrapper scales, inner wrapper counter-translates: T = -offset,
             cover-clamped so the screenshot never exposes the viewport edge. */
          var VW = 1140,
            VH = 606,
            K = VW / 2000;

          function targetT(cxSrc, cySrc, S) {
            var tx = VW / 2 - cxSrc * K;
            var ty = VH / 2 - cySrc * K;
            var mx = (VW / 2) * (1 - 1 / S);
            var my = (VH / 2) * (1 - 1 / S);
            return {
              x: Math.max(-mx, Math.min(mx, tx)),
              y: Math.max(-my, Math.min(my, ty)),
            };
          }

          // Panel centers in source-image px (measured from dashboard-preview.png)
          var CHAT = targetT(930, 320, 1.5); // Orchestrator Chat panel
          var SIM = targetT(930, 794, 1.5); // A2A simulator panel
          var PRICE = targetT(219, 720, 1.7); // Dynamic Pricing Rules panel

          var outer = "#f10-zoom-outer",
            inner = "#f10-zoom-inner";

          // Scale + counter-translate always share duration + ease
          function camera(t, S, T, dur, ease) {
            tl.to(outer, { scale: S, duration: dur, ease: ease }, t);
            tl.to(inner, { x: T.x, y: T.y, duration: dur, ease: ease }, t);
          }

          function markerIn(t, m, c) {
            tl.fromTo(
              m,
              { scale: 0.55, opacity: 0, rotation: 0 },
              {
                scale: 1,
                opacity: 1,
                rotation: -1.2,
                duration: 0.5,
                ease: "power3.out",
                transformOrigin: "50% 50%",
              },
              t
            );
            tl.fromTo(
              c,
              { y: 10, opacity: 0 },
              { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" },
              t + 0.1
            );
          }

          /* Scene 1 (0-2.45) — "It's running today":
             window arrives via INVERSE zoom-through (arriving-at seam):
             oversized -> retracts into focal plane, full-frame blur 20px. */
          tl.fromTo(
            "#f10-window-wrap",
            { scale: 1.22, opacity: 0.15, filter: "blur(20px)" },
            {
              scale: 1,
              opacity: 1,
              filter: "blur(0px)",
              duration: 0.75,
              ease: "expo.out",
            },
            0.08
          );

          /* Scene 2 (2.45-8.3) — three VO-cued callouts, velocity-matched pushes */
          // "orchestrator chat"
          camera(2.3, 1.5, CHAT, 1.0, "power2.inOut");
          markerIn(2.7, "#f10-m1", "#f10-c1");

          // "agent-to-agent twin simulator"
          tl.to(
            ["#f10-m1", "#f10-c1"],
            { opacity: 0.4, duration: 0.5, ease: "power2.out" },
            4.1
          );
          camera(4.1, 1.5, SIM, 0.95, "power2.inOut");
          markerIn(4.55, "#f10-m2", "#f10-c2");

          // "x402 dynamic pricing"
          tl.to(
            ["#f10-m2", "#f10-c2"],
            { opacity: 0.4, duration: 0.5, ease: "power2.out" },
            6.1
          );
          camera(6.1, 1.7, PRICE, 0.95, "power2.inOut");
          markerIn(6.55, "#f10-m3", "#f10-c3");

          /* Scene 3 (8.3-10.1) — "live at…": pull back to the full window,
             all three markers re-light, URL lands per-word beneath. */
          camera(8.3, 1.0, { x: 0, y: 0 }, 0.95, "power3.inOut");
          tl.to(
            ["#f10-m1", "#f10-c1", "#f10-m2", "#f10-c2"],
            { opacity: 1, duration: 0.6, ease: "power2.out" },
            8.45
          );

          tl.fromTo(
            "#f10-url",
            { y: 16, opacity: 0 },
            { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" },
            8.85
          );
          tl.fromTo(
            ".url-seg",
            { x: 26, opacity: 0 },
            {
              x: 0,
              opacity: 1,
              duration: 0.42,
              ease: "power3.out",
              stagger: 0.1,
            },
            9.0
          );

          /* Scene 4 (10.1-11.413) — held read, still. */

          window.__timelines["10-live-demo"] = tl;
        })();
      </script>
    </template>
