      <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
      <script>
        window.__timelines = window.__timelines || {};

        /*
         * Frame 7 — Traces and evals. duration 12.224s (authoritative).
         * Scene windows scaled x1.01867 from the drafted 12.0s:
         *   S1 0.000-3.667  ledger rows cascade, one per spoken cue
         *   S2 3.667-7.538  eval meters fire on their cues
         *   S3 7.538-10.594 scale-swap rows -> chips, camera push-THROUGH
         *   S4 10.594-12.224 held read, still
         */

        // Square gauge "ring" — measured stroke draw (svg-path-draw mechanics)
        var f07GaugeFill = document.getElementById("f07-gauge-fill");
        var F07_GAUGE_LEN = f07GaugeFill.getTotalLength();
        f07GaugeFill.style.strokeDasharray = String(F07_GAUGE_LEN);
        f07GaugeFill.style.strokeDashoffset = String(F07_GAUGE_LEN);

        var f07 = gsap.timeline({ paused: true });
        var EASE = "power3.out";

        /* ---- Scene 1 (0.0-3.667): ledger establishes, rows land on spoken cues ---- */
        f07.fromTo(
          "#f07-ledger-kicker",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.6, ease: EASE },
          0.15
        );
        f07.fromTo(
          "#f07-ledger-rule",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.6, ease: EASE },
          0.2
        );
        f07.fromTo(
          "#f07-colhead",
          { opacity: 0 },
          { opacity: 1, duration: 0.5, ease: "power2.out" },
          0.35
        );
        // "every routing decision"
        f07.fromTo(
          "#f07-row-1",
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.65, ease: EASE },
          0.55
        );
        // "every reply"
        f07.fromTo(
          "#f07-row-2",
          { opacity: 0, y: 18 },
          { opacity: 1, y: 0, duration: 0.65, ease: EASE },
          1.55
        );
        // "every violation" — stamps in ink at full opacity
        f07.fromTo(
          "#f07-row-3",
          { opacity: 0, scale: 1.12 },
          { opacity: 1, scale: 1, duration: 0.45, ease: EASE },
          2.45
        );
        // "lands in append-only traces" — the tag stamps
        f07.fromTo(
          "#f07-append-tag",
          { opacity: 0, scale: 1.18 },
          { opacity: 1, scale: 1, duration: 0.35, ease: EASE },
          3.15
        );

        /* ---- Scene 2 (3.667-7.538): eval meters, each exactly on its cue ---- */
        // "evals score them"
        f07.fromTo(
          "#f07-evals-kicker",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.55, ease: EASE },
          3.85
        );
        f07.fromTo(
          "#f07-evals-rule",
          { scaleX: 0 },
          { scaleX: 1, duration: 0.55, ease: EASE },
          3.9
        );
        f07.fromTo(
          "#f07-gauge-block",
          { opacity: 0 },
          { opacity: 1, duration: 0.45, ease: "power2.out" },
          4.15
        );
        // "skill respect" — square ring fills + percentage counts up, one beat
        var f07GaugeState = { v: 0 };
        var f07GaugeValueEl = document.getElementById("f07-gauge-value");
        f07.to(
          "#f07-gauge-fill",
          { strokeDashoffset: F07_GAUGE_LEN * (1 - 0.94), duration: 1.1, ease: EASE },
          4.55
        );
        f07.to(
          f07GaugeState,
          {
            v: 94,
            duration: 1.1,
            ease: EASE,
            onUpdate: function () {
              f07GaugeValueEl.textContent = String(Math.round(f07GaugeState.v));
            },
          },
          4.55
        );
        f07.fromTo(
          "#f07-gauge-value",
          { scale: 0.55 },
          { scale: 1, duration: 1.1, ease: EASE },
          4.55
        );
        f07.fromTo(
          "#f07-gauge-label",
          { opacity: 0, y: 10 },
          { opacity: 1, y: 0, duration: 0.5, ease: EASE },
          4.75
        );
        // "hop efficiency" — the bar fills beside it
        f07.fromTo(
          "#f07-hop-block",
          { opacity: 0, y: 14 },
          { opacity: 1, y: 0, duration: 0.5, ease: EASE },
          5.7
        );
        var f07HopState = { v: 0 };
        var f07HopValueEl = document.getElementById("f07-hop-value");
        f07.fromTo(
          "#f07-hop-fill",
          { scaleX: 0 },
          { scaleX: 0.87, duration: 0.9, ease: EASE },
          5.9
        );
        f07.to(
          f07HopState,
          {
            v: 87,
            duration: 0.9,
            ease: EASE,
            onUpdate: function () {
              f07HopValueEl.textContent = String(Math.round(f07HopState.v));
            },
          },
          5.9
        );

        /* ---- Scene 3 (7.538-10.594): scale-swap rows -> minted chips, push-THROUGH ---- */
        // Outgoing: scored rows shrink + dim (no exit — they remain, receded)
        f07.to(
          [
            "#f07-row-1",
            "#f07-row-2",
            "#f07-row-3",
          ],
          { opacity: 0.1, scale: 0.94, duration: 0.45, ease: "power2.in" },
          7.55
        );
        f07.to(
          "#f07-colhead",
          { opacity: 0.35, duration: 0.45, ease: "power2.in" },
          7.55
        );
        // Incoming: training-data chips pop in on "mint them into training data"
        f07.fromTo(
          "#f07-chip-1",
          { opacity: 0, y: 26, scale: 0.85 },
          { opacity: 1, y: 0, scale: 1, duration: 0.65, ease: EASE },
          7.85
        );
        f07.fromTo(
          "#f07-chip-2",
          { opacity: 0, y: 26, scale: 0.85 },
          { opacity: 1, y: 0, scale: 1, duration: 0.65, ease: EASE },
          8.05
        );
        f07.fromTo(
          "#f07-chip-3",
          { opacity: 0, y: 26, scale: 0.85 },
          { opacity: 1, y: 0, scale: 1, duration: 0.65, ease: EASE },
          8.25
        );
        f07.fromTo(
          "#f07-mint-head",
          { opacity: 0, y: 12 },
          { opacity: 1, y: 0, duration: 0.55, ease: EASE },
          8.65
        );
        // Instruments recede as the camera drives through them
        f07.to("#f07-ledger", { opacity: 0.3, duration: 1.2, ease: "power2.inOut" }, 8.8);
        f07.to("#f07-evals", { opacity: 0.3, duration: 1.2, ease: "power2.inOut" }, 8.8);

        /* ---- Camera (multi-phase-camera): slow drift-in, then push-THROUGH ---- */
        // Phase A — imperceptible continuous zoom under S1-S2
        f07.fromTo(
          "#f07-camera",
          { scale: 1, x: 0, y: 0 },
          { scale: 1.03, duration: 7.5, ease: "none" },
          0
        );
        // Phase B — signature push-THROUGH toward the minted stack; completes before hold
        f07.to(
          "#f07-camera",
          { scale: 1.55, x: -43, y: -91, duration: 1.75, ease: "power2.inOut" },
          8.8
        );

        /* ---- Scene 4 (10.594-12.224): held read on the minted stack — still ---- */

        window.__timelines["07-traces-and-evals"] = f07;
      </script>
