          /* Timing — Scene windows scaled to the authoritative 11.776s duration

          var COUNT_TO = 1907; // T-31:47 — revoked mid-flight, not expired
          var STAMP_AT = 9.85; // "revocable"
          var LINK_RETRACT_AT = 9.9;
          var LINK_RETRACT_DUR = 0.55;
          var STRIKE_FWD_AT = 10.05;
          var STRIKE_BWD_AT = 10.2;
          var DIM_AT = 10.0;
          var PAYOFF_AT = 10.15; // last cued reveal, settles into the hold

          var plane = document.getElementById("f12-plane-line");
          var sheen = document.getElementById("f12-plane-sheen");
          var link = document.getElementById("f12-link");

            var s = total % 60;

          var tl = gsap.timeline({ paused: true });

          /* ══ Scene 1 — mirror plane callback + digital glyphs at ink-faint ══ */

              { y: 0, autoAlpha: 1, duration: TILE_REVEAL_DUR, ease: "power3.out" },

          /* ══ Scene 2 — scale-swap-transition on each spoken cue ══

          var swaps = [
            { out: "#f12-g-doc", inn: "#f12-g-robot" },
            { out: "#f12-g-db", inn: "#f12-g-cam" },
            { out: "#f12-g-live", inn: "#f12-g-sensor" },
          ];
          swaps.forEach(function (pair, i) {
            var T = SWAP_AT[i];
            tl.to(
              pair.out,
              { scale: EXIT_SCALE, opacity: 0, duration: EXIT_DUR, ease: "power2.in" },
              T
            );

              pair.inn,
              { scale: EXIT_SCALE, opacity: 0 },
              { scale: 1, opacity: 1, duration: ENTER_DUR, ease: "power3.out" },
              T + EXIT_DUR - OVERLAP

          /* svg-icon-enrichment — one live internal each, then stills.

          tl.to(armState, { deg: -16, duration: 0.45, ease: "power1.inOut", onUpdate: armUpdate }, 4.1);
          tl.to(armState, { deg: 0, duration: 0.45, ease: "power1.inOut", onUpdate: armUpdate }, 4.55);

          tl.to(apState, { s: 0.15, duration: 0.18, ease: "power2.in", onUpdate: apUpdate }, 5.1);
          tl.to(apState, { s: 1, duration: 0.28, ease: "power2.out", onUpdate: apUpdate }, 5.28);

          // Sensor: pulse dot ticks once around its center (54,64)
          var dotState = { s: 1 };
          var dotEl = document.getElementById("f12-sn-dot");
          function dotUpdate() {
            dotEl.setAttribute(
              "transform",
              "translate(54 64) scale(" + dotState.s + ") translate(-54 -64)"
            );
          }
          tl.to(dotState, { s: 1.5, duration: 0.22, ease: "power2.out", onUpdate: dotUpdate }, 5.9);
          tl.to(dotState, { s: 1, duration: 0.3, ease: "power1.inOut", onUpdate: dotUpdate }, 6.12);
          tl.fromTo(
            "#f12-sn-sig",
            { opacity: 0.55 },
            { opacity: 1, duration: 0.2, ease: "power2.out" },
            5.9
          );
          tl.to("#f12-sn-sig", { opacity: 0.55, duration: 0.3, ease: "power1.out" }, 6.2);

          /* ══ Scene 3 — the access-key card (focal) ══ */
          tl.fromTo(
            "#f12-card",
            { x: 70, autoAlpha: 0 },
            { x: 0, autoAlpha: 1, duration: CARD_DUR, ease: "power3.out" },
            CARD_AT
          );
          [
            ["#f12-card-header", HEADER_AT],
            ["#f12-krow-1", ROW_1_AT],
            ["#f12-krow-2", ROW_2_AT],
          ].forEach(function (item) {
            tl.fromTo(
              item[0],
              { y: 12, autoAlpha: 0 },
              { y: 0, autoAlpha: 1, duration: 0.45, ease: "power3.out" },
              item[1]
            );
          });
          // Rail draws card → robot arm (access granted)
          tl.fromTo(
            link,
            { strokeDashoffset: linkLen },
            { strokeDashoffset: 0, duration: LINK_DRAW_DUR, ease: "power2.out" },
            LINK_DRAW_AT
          );
          // counting-dynamic-scale: entrance scale synced with the count start;
          // the countdown itself is linear (it is a timer, not drama)
          tl.fromTo(
            "#f12-timer-wrap",
            { autoAlpha: 0 },
            { autoAlpha: 1, duration: 0.4, ease: "power2.out" },
            TIMER_IN_AT
          );
          tl.fromTo(
            "#f12-timer",
            { scale: 0.92 },
            { scale: 1, duration: 0.45, ease: "power3.out" },
            TIMER_IN_AT
          );
          var countState = { v: COUNT_FROM };
          tl.to(
            countState,
            {
              v: COUNT_TO,
              duration: COUNT_END - COUNT_START,
              ease: "none",
              onUpdate: function () {
                timerEl.textContent = fmtTimer(countState.v);
              },
            },
            COUNT_START
          );

          /* "revocable" — REVOKED stamp lands (marker-stamp), timer struck
             through (css-marker-patterns sketchout), rail severs (retracting
             svg-path-draw). */
          tl.fromTo(
            "#f12-stamp",
            { scale: 1.85, rotation: -8, autoAlpha: 0 },
            { scale: 1, rotation: -8, autoAlpha: 1, duration: 0.32, ease: "power3.out" },
            STAMP_AT
          );
          tl.fromTo(
            "#f12-strike-fwd",
            { scaleX: 0, rotation: -8, opacity: 1 },
            { scaleX: 1, rotation: -8, opacity: 1, duration: 0.25, ease: "power2.out" },
            STRIKE_FWD_AT
          );
          tl.fromTo(
            "#f12-strike-bwd",
            { scaleX: 0, rotation: 8, opacity: 1 },
            { scaleX: 1, rotation: 8, opacity: 1, duration: 0.25, ease: "power2.out" },
            STRIKE_BWD_AT
          );
          tl.to(
            link,
            { strokeDashoffset: linkLen, duration: LINK_RETRACT_DUR, ease: "power2.in" },
            LINK_RETRACT_AT
          );
          // Access pulled: card body + machine dim under the stamp
          tl.to(
            "#f12-krow-1, #f12-krow-2, #f12-timer-wrap",
            { opacity: 0.55, duration: 0.45, ease: "power2.out" },
            DIM_AT
          );
          tl.to("#f12-g-robot", { opacity: 0.4, duration: 0.45, ease: "power2.out" }, DIM_AT + 0.1);

          // Payoff word — the last cued reveal, then the held read
          tl.fromTo(
            "#f12-payoff",
            { y: 26, autoAlpha: 0 },
            { y: 0, autoAlpha: 1, duration: 0.6, ease: "power3.out" },
            PAYOFF_AT
          );

          /* ══ Scene 4 — held read to 11.776s: still. No exit tween. ══ */

          window.__timelines["12-assets-get-physical"] = tl;
        })();
      </script>
    </template>
  </body>
</html>
